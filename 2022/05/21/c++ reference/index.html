                <h2 id="reference"><a href="#reference" class="headerlink" title="reference"></a>reference</h2><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="type">int</span> x = <span class="number">0</span>;</span><br><span class="line"><span class="type">int</span>* p = &amp;x; <span class="comment">// p is a pointer to x</span></span><br><span class="line"><span class="type">int</span>&amp; p = x; <span class="comment">// r is a reference to x</span></span><br><span class="line"><span class="type">int</span> x2 = <span class="number">5</span>;</span><br><span class="line"></span><br><span class="line">r = x2;</span><br><span class="line"><span class="type">int</span>&amp; r2= r;</span><br></pre></td></tr></table></figure>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	int* p = &amp;x;</span></span><br><span class="line"><span class="comment">	int *p = &amp;x;</span></span><br><span class="line"><span class="comment">	以上两行都是可以的 但是个人更喜欢是int* p</span></span><br><span class="line"><span class="comment">	因为这样的话 p 就是一个变量  这个变量是什么类型 是 pointer to int</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">  int* 是 pointer to int</span></span><br><span class="line"><span class="comment">  int&amp; 是 reference to int</span></span><br><span class="line"><span class="comment">  比如 int* p = &amp;x; 我们会说 指针指向了x</span></span><br><span class="line"><span class="comment">  而 int&amp; r = x; 我们会说 r 代表了 x 其实 r 里面有一个指针指向了 x</span></span><br><span class="line"><span class="comment">  r 只要代表了 x 就不可以代表别的变量 pointer不同 pointer还可以指向别的变量</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	所以我们接下来看</span></span><br><span class="line"><span class="comment">	int x2 = 5;</span></span><br><span class="line"><span class="comment">	r = x2;</span></span><br><span class="line"><span class="comment">	这两行代码 r 不能重新代表其他的变量了 所以 经过 &quot;r = x2;&quot; 后 r 和 x 都变成了 5</span></span><br><span class="line"><span class="comment">	再然后 int r2 = r; 现在r2是5 (&quot;r2&quot; 代表 &quot;r&quot; 亦相当于代表了 &quot;x&quot;)</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<h2 id="假象"><a href="#假象" class="headerlink" title="假象"></a>假象</h2><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	我们观察 &quot;x&quot; 跟 &quot;r&quot; 的地址和大小 会发现</span></span><br><span class="line"><span class="comment">	1. sizeof(r) = sizeof(x)</span></span><br><span class="line"><span class="comment">  2. &amp;x == &amp;r</span></span><br><span class="line"><span class="comment">  object 和其 reference 的大小相同 地址也相同(但是都是假象)</span></span><br><span class="line"><span class="comment">  java里面的所有变量都是reference</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<h2 id="reference的常见用途"><a href="#reference的常见用途" class="headerlink" title="reference的常见用途"></a>reference的常见用途</h2><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	reference 就是一种漂亮的pointer</span></span><br><span class="line"><span class="comment">	reference 通常不用于声明变量 而用于参数类型和返回类型的描述</span></span><br><span class="line"><span class="comment">*/</span> </span><br><span class="line"></span><br><span class="line"><span class="comment">// 声明</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">func1</span><span class="params">(Cls* pobj)</span> </span>&#123; pobj-&gt;<span class="built_in">xxx</span>(); &#125; <span class="comment">// pass by pointer</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">func2</span><span class="params">(Cls obj)</span> </span>&#123; obj.<span class="built_in">xxx</span>(); &#125; <span class="comment">// pass by value</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">func3</span><span class="params">(Cls&amp; obj)</span> </span>&#123; obj.<span class="built_in">xxx</span>(); &#125; <span class="comment">// pass by reference</span></span><br><span class="line"><span class="comment">// 调用</span></span><br><span class="line">Cls obj;</span><br><span class="line"><span class="built_in">func1</span>(&amp;obj);</span><br><span class="line"><span class="built_in">func2</span>(obj);</span><br><span class="line"><span class="built_in">func</span>(obj);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 我们能发现 pass by pointer 跟其他的都不一样 而 &quot;value&quot; 和 &quot;reference&quot; 被调用端 写法相同 调用端接口也相同</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// 这也就是我们最好用reference 不行再value</span></span><br></pre></td></tr></table></figure>

<h2 id="签名"><a href="#签名" class="headerlink" title="签名"></a>签名</h2><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">// 以下被视为 &quot;same signature&quot; 所以两者不能同时存在</span></span><br><span class="line"><span class="function"><span class="type">double</span> <span class="title">image</span><span class="params">(<span class="type">const</span> <span class="type">double</span>&amp; im)</span> </span>&#123; ... &#125;</span><br><span class="line"><span class="function"><span class="type">double</span> <span class="title">image</span><span class="params">(<span class="type">const</span> <span class="type">double</span> im)</span> </span>&#123; ... &#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	签名的部分为</span></span><br><span class="line"><span class="comment">		imag(const double im)</span></span><br><span class="line"><span class="comment">	说白了就是不含 return type</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	这两行 如果不算相同的签名 那么 imag(obj) 就不知道要调用谁</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">// 问题就来了 const 算不算函数签名呢 </span></span><br><span class="line"></span><br><span class="line">***是滴</span><br></pre></td></tr></table></figure>
