                <h2 id="树"><a href="#树" class="headerlink" title="树"></a>树</h2><figure class="highlight go"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	当我们在刷算法题的时候 一般回空间换时间 因为在如今科技发达的社会 硬件已经很牛逼了 所以相比较 时间更为重要</span></span><br><span class="line"><span class="comment">	还有一个点 就是升维的思想 像数组和链表其实就是一维  跳表就是二维 因此解决了一些难题</span></span><br><span class="line"><span class="comment">	树其实就是升维思想的一种体现</span></span><br><span class="line"><span class="comment">*/</span> </span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	常见的二维数据结构 树  图</span></span><br><span class="line"><span class="comment">	树跟图的差别在于有没有环</span></span><br><span class="line"><span class="comment">	链表就是特殊化的树 因为有两个指针</span></span><br><span class="line"><span class="comment">	树就是特殊化的图 没有环的图就是树</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<h2 id="二叉搜索树"><a href="#二叉搜索树" class="headerlink" title="二叉搜索树"></a>二叉搜索树</h2><figure class="highlight go"><table><tr><td class="code"><pre><span class="line"></span><br></pre></td></tr></table></figure>

<h2 id="树的定义"><a href="#树的定义" class="headerlink" title="树的定义"></a>树的定义</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="comment"># python</span></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">TreeNode</span>:</span><br><span class="line">	<span class="keyword">def</span> <span class="title function_">__init__</span>(<span class="params">self, val</span>):</span><br><span class="line">		self.val = val</span><br><span class="line">		self.left, self.right = <span class="literal">None</span>, <span class="literal">None</span></span><br></pre></td></tr></table></figure>

<figure class="highlight go"><table><tr><td class="code"><pre><span class="line"><span class="comment">// go</span></span><br><span class="line"><span class="keyword">struct</span> TreeNode &#123;</span><br><span class="line">  val <span class="type">int</span></span><br><span class="line">  left *TreeNode</span><br><span class="line">  right *TreeNode</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">// c++</span></span><br><span class="line"><span class="keyword">struct</span> <span class="title class_">TreeNode</span> &#123;</span><br><span class="line">  <span class="type">int</span> val;</span><br><span class="line">  TreeNode *left;</span><br><span class="line">  TreeNode *right;</span><br><span class="line">  <span class="built_in">TreeNode</span>(<span class="type">int</span> x): <span class="built_in">val</span>(x), <span class="built_in">left</span>(<span class="literal">NULL</span>), <span class="built_in">right</span>(<span class="literal">NULL</span>)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="树的遍历"><a href="#树的遍历" class="headerlink" title="树的遍历"></a>树的遍历</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="comment"># python</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">preorder</span>(<span class="params">self, root</span>):  <span class="comment"># 前序遍历</span></span><br><span class="line">  <span class="keyword">if</span> root:</span><br><span class="line">    self traverse_path.append(root.val)</span><br><span class="line">    self preorder(root.left)</span><br><span class="line">    self preorder(root.right)</span><br><span class="line">    </span><br><span class="line"><span class="keyword">def</span> <span class="title function_">inorder</span>(<span class="params">self, root</span>):  <span class="comment"># 中序遍历 二叉搜索树中序遍历一定升序的</span></span><br><span class="line">  <span class="keyword">if</span> root:</span><br><span class="line">    self inorder(root.left)</span><br><span class="line">    self traverse_path.append(root.val)</span><br><span class="line">    self inorder(root.right)</span><br><span class="line"> </span><br><span class="line"><span class="keyword">def</span> <span class="title function_">postorder</span>(<span class="params">self, root</span>):</span><br><span class="line">  <span class="keyword">if</span> root:</span><br><span class="line">    self postorder(root.left)</span><br><span class="line">    self postorder(root.right)</span><br><span class="line">    self traverse_path.append(root.val)</span><br></pre></td></tr></table></figure>

<figure class="highlight go"><table><tr><td class="code"><pre><span class="line"><span class="comment">// go</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">preorderTraversal</span><span class="params">(root *TreeNode)</span></span> (res []<span class="type">int</span>) &#123; <span class="comment">// 前序遍历 根-左-右</span></span><br><span class="line">    <span class="keyword">var</span> preorder <span class="function"><span class="keyword">func</span><span class="params">(node *TreeNode)</span></span></span><br><span class="line">    preorder = <span class="function"><span class="keyword">func</span><span class="params">(node *TreeNode)</span></span> &#123;</span><br><span class="line">        <span class="keyword">if</span> node == <span class="literal">nil</span> &#123;</span><br><span class="line">            <span class="keyword">return</span></span><br><span class="line">        &#125;</span><br><span class="line">        res = <span class="built_in">append</span>(res, node.Val)</span><br><span class="line">        preorder(node.Left)</span><br><span class="line">        preorder(node.Right)</span><br><span class="line">    &#125;</span><br><span class="line">    preorder(root)</span><br><span class="line">    <span class="keyword">return</span> res</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">inorderTraversal</span><span class="params">(root *TreeNode)</span></span> (res []<span class="type">int</span>) &#123; <span class="comment">// 中序遍历 左-根-右</span></span><br><span class="line">    <span class="keyword">var</span> inorder <span class="function"><span class="keyword">func</span><span class="params">(node *TreeNode)</span></span></span><br><span class="line">    inorder = <span class="function"><span class="keyword">func</span><span class="params">(node *TreeNode)</span></span> &#123;</span><br><span class="line">        <span class="keyword">if</span> node == <span class="literal">nil</span> &#123;</span><br><span class="line">            <span class="keyword">return</span></span><br><span class="line">        &#125;</span><br><span class="line">        inorder(node.Left)</span><br><span class="line">        res = <span class="built_in">append</span>(res, node.Val)</span><br><span class="line">        inorder(node.Right)        </span><br><span class="line">    &#125;</span><br><span class="line">    inorder(root)</span><br><span class="line">    <span class="keyword">return</span> res</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">postorderTraversal</span><span class="params">(root *TreeNode)</span></span> (res []<span class="type">int</span>) &#123; <span class="comment">// 后序遍历 左-右-根</span></span><br><span class="line">    <span class="keyword">var</span> postorder <span class="function"><span class="keyword">func</span><span class="params">(node *TreeNode)</span></span></span><br><span class="line">    postorder = <span class="function"><span class="keyword">func</span><span class="params">(node *TreeNode)</span></span> &#123;</span><br><span class="line">        <span class="keyword">if</span> node == <span class="literal">nil</span> &#123;</span><br><span class="line">            <span class="keyword">return</span></span><br><span class="line">        &#125;</span><br><span class="line">        postorder(node.Left)</span><br><span class="line">        postorder(node.Right)</span><br><span class="line">        res = <span class="built_in">append</span>(res, node.Val)</span><br><span class="line">    &#125;</span><br><span class="line">    postorder(root)</span><br><span class="line">    <span class="keyword">return</span> res</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight c"><table><tr><td class="code"><pre><span class="line"><span class="comment">// c++</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> &#123;</span>  <span class="comment">// 前序遍历</span></span><br><span class="line">public:</span><br><span class="line">    <span class="type">void</span> <span class="title function_">preorder</span><span class="params">(TreeNode* root, <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; &amp;res)</span> &#123;</span><br><span class="line">        <span class="keyword">if</span> (root == nullptr) <span class="keyword">return</span>;</span><br><span class="line">        res.push_back(root-&gt;val);</span><br><span class="line">        preorder(root-&gt;left, res);</span><br><span class="line">        preorder(root-&gt;right, res);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; <span class="title function_">preorderTraversal</span><span class="params">(TreeNode* root)</span> &#123;</span><br><span class="line">        <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; res;</span><br><span class="line">        preorder(root, res);</span><br><span class="line">        <span class="keyword">return</span> res;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> &#123;</span> <span class="comment">// 中序遍历</span></span><br><span class="line">public:</span><br><span class="line">    <span class="type">void</span> <span class="title function_">inorder</span><span class="params">(TreeNode* root, <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; &amp;res)</span> &#123;</span><br><span class="line">        <span class="keyword">if</span> (root == nullptr) <span class="keyword">return</span>;</span><br><span class="line">        inorder(root-&gt;left, res);</span><br><span class="line">        res.push_back(root-&gt;val);</span><br><span class="line">        inorder(root-&gt;right, res);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; <span class="title function_">inorderTraversal</span><span class="params">(TreeNode* root)</span> &#123;</span><br><span class="line">        <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; res;</span><br><span class="line">        inorder(root, res);</span><br><span class="line">        <span class="keyword">return</span> res;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> &#123;</span>  <span class="comment">// 后序遍历</span></span><br><span class="line">public:</span><br><span class="line">    <span class="type">void</span> <span class="title function_">postorder</span><span class="params">(TreeNode* root, <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt;&amp; res)</span> &#123;</span><br><span class="line">        <span class="keyword">if</span> (root == nullptr) <span class="keyword">return</span>;</span><br><span class="line">        postorder(root-&gt;left, res);</span><br><span class="line">        postorder(root-&gt;right, res);</span><br><span class="line">        res.push_back(root-&gt;val);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; <span class="title function_">postorderTraversal</span><span class="params">(TreeNode* root)</span> &#123;</span><br><span class="line">        <span class="built_in">vector</span>&lt;<span class="type">int</span>&gt; res;</span><br><span class="line">        postorder(root, res);</span><br><span class="line">        <span class="keyword">return</span> res;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
